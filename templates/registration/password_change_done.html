<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Hasło zmienione | SkradzionePojazdy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      background-color: #f2f4f8;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    /* Sekcja główna */
    .content-wrapper {
      flex: 1 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px 15px;
    }

    .content-box {
      background: #fff;
      padding: 50px 40px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    h2 {
      color: #198754;
      font-weight: 600;
      margin-bottom: 15px;
    }

    p {
      color: #555;
      font-size: 1.05rem;
    }

    /* Przyciski */
    .btn-main {
      background-color: #1e5ed8;
      color: #fff;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      transition: background 0.2s;
    }

    .btn-main:hover {
      background-color: #164dc0;
      color: #fff;
    }

    .btn-outline-secondary {
      border-radius: 8px;
      padding: 10px 18px;
    }

    /* Stopka */
    footer {
      flex-shrink: 0;
      background: transparent;
      text-align: center;
      color: #777;
      font-size: 0.9rem;
      padding: 20px 0;
    }
  </style>
</head>
<body>

<!-- Treść -->
<div class="content-wrapper">
  <div class="content-box">
    <h2>Hasło zostało zmienione pomyślnie</h2>
    <p>Twoje hasło zostało zaktualizowane. Możesz kontynuować korzystanie z serwisu.</p>

    <div class="mt-4">
      <a href="/" class="btn btn-main me-2">Strona główna</a>
      <a href="{% url 'accounts_profile' %}" class="btn btn-outline-secondary">Moje konto</a>
    </div>
  </div>
</div>

<!-- Stopka -->
<footer>
  © 2025 <strong>SkradzionePojazdy</strong> | Projekt inżynierski – Python Django
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
