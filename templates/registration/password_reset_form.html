{% load static %}
<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>Odzyskiwanie konta – reset hasła</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container" style="max-width:560px">
  <h3 class="mt-5 mb-3 text-primary text-center">Odzyskiwanie konta</h3>
  <p class="text-muted text-center">Podaj adres e-mail powiązany z kontem. Wyślemy Ci link do ustawienia nowego hasła.</p>

  <form method="post" class="card p-4 shadow-sm bg-white">
    {% csrf_token %}
    <div class="mb-3">
      {{ form.email.label_tag }} {{ form.email }}
      {% for e in form.email.errors %}<div class="text-danger small">{{ e }}</div>{% endfor %}
    </div>
    <button class="btn btn-primary w-100" type="submit">Wyślij link resetujący</button>
  </form>

  <div class="text-center mt-3">
    <a href="{% url 'login' %}">← Powrót do logowania</a>
  </div>
</div>
</body>
</html>
