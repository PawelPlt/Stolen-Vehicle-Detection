<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Zmiana statusu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
  <div class="container">
    <h3>Zgłoszenie {{ report.ticket_number }}</h3>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-success">Zapisz zmiany</button>
      <a href="{% url 'officer_dashboard' %}" class="btn btn-secondary">Anuluj</a>
    </form>
  </div>
</body>
</html>
