<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Utwórz konto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .register-container {
      max-width: 420px;
      margin: 80px auto;
      background: #fff;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    h3 {
      text-align: center;
      color: #1e5ed8;
      font-weight: 600;
      margin-bottom: 25px;
    }

    .form-label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
    }

    /* Wszystkie pola tej samej szerokości i wysokości */
    .register-container input[type="text"],
    .register-container input[type="email"],
    .register-container input[type="password"] {
      display: block;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      border-radius: 8px;
      padding: 10px 12px;
      border: 1px solid #ced4da;
      font-size: 1rem;
    }

    /* 🔹 Delikatniejsze teksty pomocy pod polami */
    .helptext,
    ul li {
      font-size: 0.85rem;
      color: #6c757d;
      line-height: 1.3em;
    }

    ul {
      margin-bottom: 8px;
      padding-left: 20px;
    }

    .btn-register {
      background-color: #1e5ed8;
      color: white;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      width: 100%;
      padding: 10px;
      transition: background 0.2s;
    }

    .btn-register:hover {
      background-color: #164dc0;
    }

    .links {
      margin-top: 15px;
      text-align: center;
    }

    .links a {
      text-decoration: none;
      color: #1e5ed8;
      font-size: 0.9rem;
    }

    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="register-container">
  <h3>Utwórz konto</h3>
  <form method="post">
    {% csrf_token %}
    {{ form.non_field_errors }}

    {% for field in form %}
      <div class="mb-3">
        <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
        {{ field }}
        {% if field.help_text %}
          <small class="form-text text-muted d-block mt-1">{{ field.help_text|safe }}</small>
        {% endif %}
        {% for error in field.errors %}
          <div class="text-danger small">{{ error }}</div>
        {% endfor %}
      </div>
    {% endfor %}

    <button type="submit" class="btn-register">Zarejestruj</button>
  </form>

  <div class="links mt-3">
    <a href="{% url 'login' %}">← Mam już konto</a>
  </div>
</div>

</body>
</html>
