<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Rejestracja</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; font-family: "Segoe UI", Arial, sans-serif; }
    .register-container {
      max-width: 500px;
      margin: 60px auto;
      background-color: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<!-- 🔹 Pasek nawigacji -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold text-primary" href="/">SkradzionePojazdy</a>
    <div class="collapse navbar-collapse justify-content-end">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="/">Strona główna</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Logowanie</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- 🔹 Formularz -->
<div class="register-container">
  <h3 class="text-center mb-4">Rejestracja</h3>

  <form method="post" novalidate>
    {% csrf_token %}

    {% for field in form %}
      <div class="mb-3">
        <label class="form-label">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
          <div class="text-danger small">{{ field.errors|striptags }}</div>
        {% endif %}
      </div>
    {% endfor %}

    <button type="submit" class="btn btn-primary w-100">Załóż konto</button>
  </form>

  <p class="text-center mt-3">
    Masz już konto? <a href="{% url 'login' %}">Zaloguj się</a>
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
