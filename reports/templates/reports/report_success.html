<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Zgłoszenie przyjęte</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container text-center mt-5">
  <div class="card shadow p-5">
    <h2 class="text-success mb-3">✅ Zgłoszenie zostało przyjęte</h2>
    <p class="lead">Dziękujemy za zgłoszenie. Twój numer sprawy to:</p>
    <h3 class="fw-bold text-primary">{{ ticket_number }}</h3>

    <p class="mt-3">Na podany adres e-mail zostaną wysłane powiadomienia o zmianach statusu sprawy.</p>

    <div class="mt-4">
      <a href="/" class="btn btn-outline-primary">Powrót na stronę główną</a>
      <a href="{% url 'status_lookup' %}" class="btn btn-primary ms-2">Sprawdź status zgłoszenia</a>
    </div>
  </div>
</div>

</body>
</html>
